backend:
  name: github
  repo: your-github-user/mahadev-adiguru
  branch: main
media_folder: "site/assets/uploads"
public_folder: "/assets/uploads"
collections:
  - name: "articles"
    label: "Articles"
    folder: "content/articles"
    create: true
    slug: "{{slug}}"
    fields:
      - {label: "Title", name: "title", widget: "string"}
      - {label: "Summary", name: "summary", widget: "text"}
      - {label: "Body", name: "body", widget: "markdown"}
      - {label: "Featured Image", name: "image", widget: "image", required: false}
  - name: "videos"
    label: "YouTube Videos"
    folder: "content/videos"
    create: true
    slug: "{{slug}}"
    fields:
      - {label: "Title", name: "title", widget: "string"}
      - {label: "YouTube ID", name: "youtube_id", widget: "string"}
      - {label: "Channel", name: "channel", widget: "string"}
      - {label: "Category", name: "category", widget: "select", options: ["Mantra", "Meditation", "Learning", "Temple"]}
